services:
  db:
    image: postgres:15-alpine
    container_name: enterprise-rag-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  cache:
    image: redis:alpine
    container_name: enterprise-rag-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: enterprise-rag-mq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  etcd:
    image: milvusdb/etcd:3.5.5-r2
    container_name: milvus-etcd
    environment:
      - ETCD_AUTO_COMPACT_RETENTION_HR=1
      - ALLOW_NONE_AUTHENTICATION=yes
    volumes:
      - etcd_data:/etcd
    restart: always

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      - etcd
      - minio
    restart: always

  engine:
    build: ./engine
    container_name: enterprise-rag-engine
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - REDIS_URL=redis://cache:6379/0
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://cache:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - HTTP_PROXY=socks5h://host.docker.internal:1088
      - HTTPS_PROXY=socks5h://host.docker.internal:1088
      - ALL_PROXY=socks5h://host.docker.internal:1088
      - NO_PROXY=localhost,127.0.0.1,db,engine,gateway,cache,rabbitmq,etcd,minio,milvus,api.deepseek.com
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - cache
      - milvus
      - rabbitmq
    volumes:
      - ~/.EasyOCR/model:/root/.EasyOCR/model
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health')"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  worker:
    build: ./engine
    container_name: enterprise-rag-worker
    command: celery -A tasks worker --loglevel=info
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - REDIS_URL=redis://cache:6379/0
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://cache:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - HTTP_PROXY=socks5h://host.docker.internal:1088
      - HTTPS_PROXY=socks5h://host.docker.internal:1088
      - ALL_PROXY=socks5h://host.docker.internal:1088
      - NO_PROXY=localhost,127.0.0.1,db,engine,gateway,cache,rabbitmq,etcd,minio,milvus,api.deepseek.com
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - cache
      - milvus
      - rabbitmq
    volumes:
      - ~/.EasyOCR/model:/root/.EasyOCR/model
    restart: always

  gateway:
    build: ./gateway
    container_name: enterprise-rag-gateway
    environment:
      - ENGINE_URL=http://engine:8001
      - PORT=8000
    ports:
      - "80:8000"
    depends_on:
      - engine
    restart: always

volumes:
  pgdata:
  etcd_data:
  minio_data:
  milvus_data:
