                archContent: "Why does it take 1-2 minutes to receive an answer?\n\nGeneral AI models (like ChatGPT) blindly process entire documents, leading to severe hallucinations and length limitations. Our system uses a true enterprise-grade architecture:\nWhen you click 'Launch Analysis', the Gateway pushes the task into a RabbitMQ message queue, picked up by a cluster of Celery Workers. The workers slice hundreds of pages into thousands of vector chunks and construct a Milvus Vector Database in real-time. This underlying process (Building Vector Database) requires massive computation.\nOnly after the database is built does the system use RAG (Retrieval-Augmented Generation) to extract precise financial data points for the LLM to reason upon, ensuring every claim is backed by evidence.",

                ragasRecall: "2. Answer Recall",
                ragasRecallDesc: "Measures whether the report covers all critical financial metrics and business logic present in the source document required to answer the query.",

                ragasRel: "3. Answer Relevance",

                                        className={`px-2 py-1 md:px-3 md:py-1.5 rounded-md transition-all whitespace-nowrap ${lang === l ? 'bg-white shadow-sm text-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}

                                    </button>
                                ))}
                            </div>
                        </div>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
